<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>🔊 ToneForge — Mandarin Learning Tutor</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="brand-mark">🔊</span> ToneForge</span>
    <select id="voice" class="voice-select" title="Tutor voice">
      <option value="zh-CN-XiaoxiaoNeural">Xiaoxiao (♀ warm)</option>
      <option value="zh-CN-XiaoyiNeural">Xiaoyi (♀ lively)</option>
      <option value="zh-CN-YunxiNeural">Yunxi (♂ lively)</option>
      <option value="zh-CN-YunyangNeural">Yunyang (♂ pro)</option>
    </select>
  </header>

  <nav class="tabs">
    <button id="tabChat" class="tab active" type="button">💬 Chat</button>
    <button id="tabLearn" class="tab" type="button">📚 Learn</button>
    <button id="tabDrill" class="tab" type="button">🎯 Tone Drill</button>
    <button id="tabProgress" class="tab" type="button">🏆 Progress</button>
  </nav>

  <main id="chat" class="chat">
    <div class="hint" id="hint">
      <p>👋 你好! Tap the mic and speak Mandarin.</p>
      <p class="sub">Your tutor will reply, correct you, and show pinyin + meaning.</p>
    </div>
  </main>

  <section id="learn" class="learn">
    <div id="learnList" class="learn-list"></div>
  </section>

  <section id="drill" class="drill">
    <div class="drill-card">
      <div class="drill-hanzi" id="drillHanzi">妈</div>
      <div class="drill-pinyin" id="drillPinyin">mā</div>
      <div class="drill-en" id="drillEn">mother</div>
      <span class="drill-tone-badge" id="drillToneBadge">Tone 1 — high flat</span>
      <div class="drill-actions">
        <button id="drillListen" class="drill-btn listen" type="button">🔊 Example</button>
        <button id="drillRec" class="drill-btn rec" type="button">🎤 Record</button>
        <button id="drillNext" class="drill-btn next" type="button">➡️ Next</button>
      </div>
    </div>
    <div id="drillResult" class="drill-result" hidden></div>
  </section>

  <section id="progress" class="progress-panel">
    <div class="prog-streak">
      <div class="prog-streak-num" id="progStreak">0</div>
      <div class="prog-streak-label">day streak 🔥</div>
    </div>
    <div class="prog-stats">
      <div class="prog-stat"><span id="progAttempts">0</span><small>drills</small></div>
      <div class="prog-stat"><span id="progAvg">0</span><small>avg score</small></div>
      <div class="prog-stat"><span id="progDone">0</span><small>lessons done</small></div>
    </div>
    <div class="prog-section-title">🏆 Badges</div>
    <div id="progBadges" class="prog-badges"></div>
  </section>

  <div id="status" class="status" hidden></div>

  <footer class="composer">
    <button id="mic" class="mic" aria-label="Hold to speak">
      <span class="mic-icon">🎤</span>
      <span class="mic-label">Tap to speak</span>
    </button>
    <div class="typerow">
      <input id="textInput" class="text-input" type="text"
             placeholder="…or type Mandarin here" autocomplete="off" />
      <button id="sendBtn" class="send-btn" aria-label="Send">➤</button>
    </div>
  </footer>

  <audio id="player" hidden></audio>
  <script src="config.js?v=11"></script>
  <script src="app.js?v=11"></script>
  <script src="vad.js?v=11"></script>
  <script src="drill.js?v=11"></script>
  <script src="learn.js?v=11"></script>
  <script src="progress.js?v=11"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
