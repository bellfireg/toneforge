<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>🔊 ToneForge — Mandarin Learning Tutor</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=16" />
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="brand-mark">🔊</span> ToneForge</span>
    <select id="voice" class="voice-select" title="Tutor voice">
      <option value="zh-CN-XiaoxiaoNeural">Xiaoxiao (♀ warm)</option>
      <option value="zh-CN-XiaoyiNeural">Xiaoyi (♀ lively)</option>
      <option value="zh-CN-YunxiNeural">Yunxi (♂ lively)</option>
      <option value="zh-CN-YunyangNeural">Yunyang (♂ pro)</option>
    </select>
  </header>

  <nav class="tabs">
    <button id="tabChat"      class="tab active" type="button">💬 Chat</button>
    <button id="tabLearn"     class="tab" type="button">📚 Learn</button>
    <button id="tabDrill"     class="tab" type="button">🎯 Drill</button>
    <button id="tabWrite"     class="tab" type="button">✍️ Write</button>
    <button id="tabChallenge" class="tab" type="button">⚡ Challenge</button>
    <button id="tabSRS"       class="tab" type="button">🔁 Review</button>
    <button id="tabProgress"  class="tab" type="button">🏆 Progress</button>
  </nav>

  <main id="chat" class="chat">
    <div class="hint" id="hint">
      <p>👋 你好! Tap the mic and speak Mandarin.</p>
      <p class="sub">Your tutor will reply, correct you, and show pinyin + meaning.</p>
    </div>
  </main>

  <section id="learn" class="learn">
    <div id="learnList" class="learn-list"></div>
  </section>

  <section id="drill" class="drill">
    <button class="drill-back-btn" id="drillBackBtn" type="button" aria-label="Back to Learn">← Back to Learn</button>
    <div class="drill-card">
      <div class="drill-hanzi" id="drillHanzi">妈</div>
      <div class="drill-pinyin" id="drillPinyin">mā</div>
      <div class="drill-en" id="drillEn">mother</div>
      <span class="drill-tone-badge" id="drillToneBadge">Tone 1 — high flat</span>
      <div class="drill-actions">
        <button id="drillListen" class="drill-btn listen" type="button">🔊 Example</button>
        <button id="drillRec" class="drill-btn rec" type="button">🎤 Record</button>
        <button id="drillNext" class="drill-btn next" type="button">➡️ Next</button>
      </div>
    </div>
    <div id="drillResult" class="drill-result" hidden></div>
  </section>

  <section id="write" class="write">
    <div class="write-card">
      <div class="write-meta">
        <div>
          <div class="write-pinyin" id="writePinyin">nǐ</div>
          <div class="write-en" id="writeEn">you</div>
        </div>
        <div class="write-count" id="writeCharCount">character 1 of 1</div>
      </div>
      <div class="write-target" id="writeTarget">target: 你</div>
      <canvas id="writeCanvas" class="write-canvas" width="320" height="320" aria-label="Blank handwriting scratchpad"></canvas>
      <div class="write-actions">
        <button id="writeUndo" class="write-btn" type="button">Undo</button>
        <button id="writeClear" class="write-btn" type="button">Clear</button>
        <button id="writeCheck" class="write-btn primary" type="button">Check</button>
        <button id="writeNext" class="write-btn next" type="button">Next</button>
      </div>
    </div>
    <div id="writeResult" class="write-result" hidden></div>
    <div id="writeCandidates" class="write-candidates" hidden></div>
  </section>

  <!-- Challenge tab panel -->
  <section id="challengePanel" class="challenge-panel">
    <div class="chall-header">
      <div class="prog-section-title">⚡ Daily Challenge</div>
      <div class="chall-date" id="challDate"></div>
      <div class="chall-status" id="challStatus"></div>
    </div>
    <div id="challList" class="chall-list"></div>
    <div id="challDone" class="chall-done-banner" hidden></div>
  </section>

  <!-- SRS Review tab panel -->
  <section id="srsPanel" class="srs-panel">
    <div class="srs-header">
      <div class="prog-section-title">🔁 SRS Review</div>
      <div class="srs-counter" id="srsCounter"></div>
    </div>
    <div id="srsLoading" class="srs-loading" hidden>⏳ Loading due cards…</div>
    <div id="srsEmpty"   class="srs-empty"   hidden></div>
    <div id="srsCardArea" class="srs-card-area" hidden>
      <div class="srs-card" id="srsFront"></div>
      <div class="srs-card srs-card-back" id="srsBack" hidden></div>
      <button class="recall-submit-btn" id="srsFlip" type="button">👁 Reveal</button>
      <div class="srs-rating-row" id="srsRatingRow" hidden>
        <button class="srs-rate-btn again" data-rating="1" type="button">Again</button>
        <button class="srs-rate-btn hard"  data-rating="2" type="button">Hard</button>
        <button class="srs-rate-btn good"  data-rating="3" type="button">Good</button>
        <button class="srs-rate-btn easy"  data-rating="4" type="button">Easy</button>
      </div>
    </div>
  </section>

  <!-- Progress tab panel (rebuilt by progress.js) -->
  <section id="progress" class="progress-panel"></section>

  <div id="status" class="status" hidden></div>

  <footer class="composer">
    <button id="mic" class="mic" aria-label="Hold to speak">
      <span class="mic-icon">🎤</span>
      <span class="mic-label">Tap to speak</span>
    </button>
    <div class="typerow">
      <input id="textInput" class="text-input" type="text"
             placeholder="…or type Mandarin here" autocomplete="off" />
      <button id="sendBtn" class="send-btn" aria-label="Send">➤</button>
    </div>
  </footer>

  <audio id="player" hidden></audio>
  <script src="config.js?v=16"></script>
  <script src="app.js?v=16"></script>
  <script src="vad.js?v=16"></script>
  <script src="drill.js?v=16"></script>
  <script src="learn.js?v=16"></script>
  <script src="vendor/hanzilookup/hanzilookup.min.js"></script>
  <script src="write.js?v=16"></script>
  <script src="scratchpad.js?v=16"></script>
  <script src="recall.js?v=16"></script>
  <script src="challenges.js?v=16"></script>
  <script src="srs-review.js?v=16"></script>
  <script src="progress.js?v=16"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
